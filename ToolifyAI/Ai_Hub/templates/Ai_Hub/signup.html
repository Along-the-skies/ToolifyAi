{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ToolifyAI</title>
    <link rel="stylesheet" href="{% static 'Ai_Hub/style.css' %}">
</head>
<body>
    <div class="auth-card">
        <h1>Create your account</h1>
        <p class="auth-subtitle">Sign up to start using ToolifyAI's tools.</p>

        {% if form.errors %}
            <p class="auth-error">{{ form.email.errors|striptags }}</p>
        {% endif %}

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>


        <p class="auth-footer">Already have an account? <a href="{% url 'Ai_Hub:login' %}">Log in</a></p>
    </div>
</body>
</html>
