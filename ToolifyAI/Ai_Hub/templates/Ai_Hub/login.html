{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — ToolifyAI</title>
    <link rel="stylesheet" href="{% static 'Ai_Hub/style.css' %}">
</head>
<body>
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Log in to continue to ToolifyAI.</p>

        {% if messages %}
            {% for message in messages %}
                <p class="auth-error">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>

       
        <p class="auth-footer">No account? <a href="{% url 'Ai_Hub:signup' %}">Sign up</a></p>
    </div>
</body>
</html>
