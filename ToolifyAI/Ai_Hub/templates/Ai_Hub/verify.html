{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — ToolifyAI</title>
    <link rel="stylesheet" href="{% static 'Ai_Hub/style.css' %}">
</head>
<body>
    <div class="auth-card">
        <h1>Check your email</h1>
        <p class="auth-subtitle">Enter the 6-digit code we sent you.</p>

        <form method="POST" class="auth-form">
            {% csrf_token %}
            <input type="text" name="code" placeholder="123456" maxlength="6" required autofocus class="code-input">
            <button type="submit">Verify</button>
        </form>
    </div>
</body>
</html>
